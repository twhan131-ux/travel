<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>둘만의 국내여행 패스포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3ECDA;
    --paper-deep:#E9DEC2;
    --ink:#1F2A44;
    --ink-soft:#3A4A6B;
    --stamp-red:#A8362C;
    --ochre:#C68A33;
    --pine:#3F5B49;
    --charcoal:#2A2520;
    --line:#cdbf9c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:'IBM Plex Sans KR', sans-serif;
    color:var(--charcoal);
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(0,0,0,0.025) 0, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(0,0,0,0.03) 0, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0.015) 0, transparent 60%);
    min-height:100vh;
    padding: 32px 16px 80px;
  }
  .app{max-width:760px; margin:0 auto;}

  .eyebrow{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--stamp-red); font-weight:700; margin:0 0 6px;
  }
  h1,h2,h3{font-family:'Noto Serif KR', serif; margin:0 0 8px; color:var(--ink); line-height:1.3;}
  h1{font-size:30px; font-weight:900;}
  h2{font-size:22px; font-weight:700;}
  h3{font-size:20px; font-weight:900; color:var(--stamp-red);}
  p{margin:0 0 4px; line-height:1.6;}
  .lead{color:var(--ink-soft); font-size:15px; margin-bottom:20px;}

  .card{
    background:var(--paper);
    border:1.5px solid var(--charcoal);
    box-shadow: 5px 5px 0 rgba(42,37,32,0.18);
    border-radius:2px;
    padding:28px 26px;
    margin-bottom:24px;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute; inset:6px;
    border:1px dashed var(--line);
    pointer-events:none;
  }

  .progress{height:8px; background:var(--paper-deep); border:1px solid var(--charcoal); margin:14px 0 6px; overflow:hidden;}
  .progress-bar{height:100%; background:var(--stamp-red); width:0%; transition:width .5s ease;}
  .progress-label{font-size:13px; color:var(--ink-soft); margin-bottom:18px;}

  .btn{
    font-family:'IBM Plex Sans KR', sans-serif;
    font-weight:600; font-size:15px;
    border-radius:2px; cursor:pointer;
    padding:13px 22px; border:1.5px solid var(--ink);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--ink); color:var(--paper); box-shadow:3px 3px 0 rgba(42,37,32,0.25);}
  .btn-primary:hover{background:var(--ink-soft);}
  .btn-secondary{background:var(--stamp-red); color:var(--paper); border-color:var(--stamp-red); box-shadow:3px 3px 0 rgba(42,37,32,0.25);}
  .btn-secondary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border-color:var(--line);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn:focus-visible{outline:3px solid var(--ochre); outline-offset:2px;}

  .all-done{font-weight:700; color:var(--pine); margin-top:10px;}

  .wheel-wrap{position:relative; width:260px; margin:6px auto 18px;}
  .pointer{
    position:absolute; top:-12px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:13px solid transparent; border-right:13px solid transparent;
    border-bottom:22px solid var(--stamp-red); z-index:5; filter:drop-shadow(1px 2px 0 rgba(0,0,0,.2));
  }
  .wheel-wrap svg{width:100%; height:auto; display:block; filter:drop-shadow(2px 4px 6px rgba(0,0,0,.18));}
  .wheel-spin{transform-origin:150px 150px;}
  .wheel-label{
    font-family:'Noto Serif KR', serif; font-weight:700; font-size:15px;
    fill:var(--paper); pointer-events:none;
  }

  .result-line{
    text-align:center; font-family:'Noto Serif KR', serif; font-weight:900; font-size:18px;
    color:var(--ink); margin:10px 0 16px;
  }

  .stage1Card, .stage2Card, .wheel-card{text-align:center;}
  .wheel-card .eyebrow, .wheel-card h2{text-align:left;}
  .wheel-card .btn{display:block; margin:0 auto;}

  .stamp-grid{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}
  .stamp-chip{
    border:1.5px dashed var(--stamp-red); border-radius:50%;
    width:96px; height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; transform:rotate(-4deg); color:var(--stamp-red); flex-shrink:0;
  }
  .stamp-chip:nth-child(even){transform:rotate(3deg); border-color:var(--pine); color:var(--pine);}
  .chip-month{font-size:10px; letter-spacing:.08em; opacity:.8;}
  .chip-region{font-size:10px; opacity:.85;}
  .chip-name{font-family:'Noto Serif KR', serif; font-weight:900; font-size:15px;}
  .empty-note{color:var(--ink-soft); font-size:14px; font-style:italic;}

  .manage-region{margin-bottom:16px;}
  .manage-region h4{
    font-family:'Noto Serif KR', serif; font-size:14px; font-weight:700;
    color:var(--ink-soft); margin:0 0 4px; letter-spacing:.02em;
  }
  .manage-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:9px 2px; border-bottom:1px dashed var(--line); font-size:14px;
  }
  .manage-region:last-child .manage-row:last-child{border-bottom:none;}
  .manage-name{font-weight:600;}
  .manage-desc{color:var(--ink-soft); font-size:12px; margin-top:1px;}
  .tag{font-size:11px; padding:3px 9px; border-radius:10px; border:1px solid; white-space:nowrap;}
  .tag-visited{color:var(--pine); border-color:var(--pine);}
  .tag-excluded{color:var(--ink-soft); border-color:var(--line); background:var(--paper-deep);}
  .row-right{display:flex; align-items:center; gap:8px;}
  .btn-small{font-size:12px; padding:6px 12px;}

  footer{text-align:center; margin-top:10px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap;}
  .reset-link{background:none; border:none; color:var(--ink-soft); font-size:12px; text-decoration:underline; cursor:pointer; font-family:inherit;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(31,42,68,0.72);
    display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;
  }
  .modal-overlay[hidden]{display:none;}
  .modal-card{
    background:var(--paper); border:1.5px solid var(--charcoal); max-width:420px; width:100%;
    padding:26px 24px; position:relative; box-shadow:8px 8px 0 rgba(0,0,0,0.3); text-align:center;
    max-height:92vh; overflow-y:auto;
  }
  .modal-close{
    position:absolute; top:10px; right:12px; background:none; border:none; font-size:22px;
    color:var(--ink-soft); cursor:pointer; line-height:1;
  }
  .modal-card .eyebrow{text-align:center;}
  .map-wrap{position:relative; width:100%; max-width:300px; margin:10px auto 6px;}
  .map-wrap svg{width:100%; display:block;}
  .land-shape{fill:var(--paper-deep); stroke:var(--ink); stroke-width:2;}
  .pin-dim{fill:var(--line); opacity:.8;}
  .pin-highlight{fill:var(--stamp-red); stroke:var(--paper); stroke-width:2;
    animation: pulse 1.4s ease-in-out infinite;}
  .pin-label{font-family:'Noto Serif KR', serif; font-weight:900; font-size:15px; fill:var(--ink);}
  @keyframes pulse{0%,100%{r:8;} 50%{r:11;}}

  .stamp-mark{
    position:absolute; top:50%; left:50%; width:130px; height:130px; margin:-65px 0 0 -65px;
    border:5px solid var(--stamp-red); border-radius:50%; opacity:0;
    transform:scale(2.2) rotate(-22deg); pointer-events:none; mix-blend-mode:multiply;
  }
  .stamp-mark.stamp-anim{animation: stampIn .55s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes stampIn{
    0%{opacity:0; transform:scale(2.2) rotate(-22deg);}
    60%{opacity:.9; transform:scale(.82) rotate(-8deg);}
    100%{opacity:.85; transform:scale(1) rotate(-8deg);}
  }
  #modalDestTitle{font-size:26px;}
  #modalDestDesc{color:var(--ink-soft); margin-bottom:16px;}
  .modal-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;}

  @media (prefers-reduced-motion: reduce){
    .wheel-spin{transition-duration:.05s !important;}
    .stamp-mark.stamp-anim{animation-duration:.05s !important;}
    .pin-highlight{animation:none;}
  }
  @media (max-width:480px){
    .card{padding:20px 16px;}
    h1{font-size:24px;}
  }
</style>
</head>
<body>
<div class="app">

  <section class="card" id="introCard">
    <p class="eyebrow">MONTHLY TRIP STAMP · 부부 국내여행 패스포트</p>
    <h1>이번 달, 어디로 갈까요?</h1>
    <p class="lead">서울·경기·제주를 뺀 전국 7개 도, 21개 후보지 — 매달 한 곳씩 도장을 찍어요.</p>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-label" id="progressLabel">0 / 21 다녀옴</p>
    <button class="btn btn-primary" id="startBtn">이번 달 여행지 뽑기</button>
    <p class="all-done" id="allDoneMsg" hidden>축하해요, 7개 도 21곳을 모두 다녀왔어요! 🎉</p>
  </section>

  <section class="card wheel-card" id="stage1Card" hidden>
    <p class="eyebrow">STEP 1</p>
    <h2>어느 도로 갈까요?</h2>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg viewBox="0 0 300 300" id="wheel1"></svg>
    </div>
    <button class="btn btn-secondary" id="spin1Btn">도(道) 뽑기</button>
    <p class="result-line" id="result1" hidden></p>
    <button class="btn btn-primary" id="toStage2Btn" hidden>다음: 여행지 뽑기 →</button>
  </section>

  <section class="card wheel-card" id="stage2Card" hidden>
    <p class="eyebrow">STEP 2 · <span id="stage2Region"></span></p>
    <h2>어디로 갈까요?</h2>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg viewBox="0 0 300 300" id="wheel2"></svg>
    </div>
    <button class="btn btn-secondary" id="spin2Btn">여행지 뽑기</button>
    <p class="result-line" id="result2" hidden></p>
    <button class="btn btn-primary" id="openMapBtn" hidden>지도에서 확인하기 →</button>
  </section>

  <section class="card">
    <p class="eyebrow">TRAVEL LOG</p>
    <h2>지금까지의 도장</h2>
    <div class="stamp-grid" id="historyGrid"></div>
  </section>

  <section class="card">
    <p class="eyebrow">CANDIDATE LIST</p>
    <h2>후보지 관리</h2>
    <p class="lead" style="margin-bottom:14px;">같은 여행에서 같이 들렀거나, 이번엔 가지 않기로 한 곳은 미리 제외할 수 있어요. 제외해도 "다녀옴" 기록으로는 남지 않아요.</p>
    <div id="manageList"></div>
  </section>

  <footer>
    <button class="reset-link" id="resetBtn">방문 기록 초기화</button>
    <button class="reset-link" id="resetExcludedBtn">제외 목록 초기화</button>
  </footer>
</div>

<div class="modal-overlay" id="mapModal" hidden>
  <div class="modal-card">
    <button class="modal-close" id="modalClose" aria-label="닫기">×</button>
    <p class="eyebrow" id="modalMonthLabel"></p>
    <div class="map-wrap">
      <svg viewBox="0 0 400 460" id="koreaMap"></svg>
      <div class="stamp-mark" id="stampMark"></div>
    </div>
    <h3 id="modalDestTitle"></h3>
    <p id="modalDestDesc"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="rerollBtn">취소하고 다시 뽑기</button>
      <button class="btn btn-primary" id="confirmBtn">이 곳으로 확정! ✓</button>
    </div>
  </div>
</div>

<script>
const svgNS = 'http://www.w3.org/2000/svg';
const STORAGE_KEY = 'kr-travel-roulette-history';
const PALETTE = ['#1F2A44', '#A8362C', '#C68A33', '#3F5B49'];

const KOREA_PATH = "M70,40 L140,30 L220,35 L280,60 L300,120 L290,180 L310,230 L340,260 L330,310 L300,360 L270,400 L230,420 L190,430 L170,415 L140,425 L110,400 L90,370 L70,330 L60,290 L55,250 L60,200 L75,170 L65,140 L75,100 L70,70 Z";

const DATA = [
  {region:"강원도", items:[
    {name:"강릉", desc:"경포대 · 안목해변 · 커피거리", x:311, y:117},
    {name:"평창", desc:"대관령 · 오대산", x:266, y:156},
    {name:"춘천", desc:"남이섬 · 소양강", x:207, y:104},
  ]},
  {region:"충청북도", items:[
    {name:"단양", desc:"단양팔경 · 도담삼봉", x:264, y:196},
    {name:"제천", desc:"의림지 · 청풍문화재단지", x:248, y:180},
    {name:"충주", desc:"탄금대 · 수안보", x:225, y:197},
  ]},
  {region:"충청남도", items:[
    {name:"부여", desc:"백제문화단지 · 부소산성", x:135, y:267},
    {name:"공주", desc:"공산성 · 무령왕릉", x:153, y:250},
    {name:"보령", desc:"대천해수욕장", x:108, y:262},
  ]},
  {region:"전북특별자치도", items:[
    {name:"전주", desc:"한옥마을 · 전동성당", x:156, y:314},
    {name:"군산", desc:"근대문화거리 · 선유도", x:120, y:299},
    {name:"남원", desc:"광한루원 · 지리산", x:177, y:356},
  ]},
  {region:"전라남도", items:[
    {name:"여수", desc:"여수밤바다 · 오동도", x:201, y:422},
    {name:"순천", desc:"순천만습지 · 낙안읍성", x:186, y:403},
    {name:"보성", desc:"보성녹차밭", x:150, y:421},
  ]},
  {region:"경상북도", items:[
    {name:"경주", desc:"불국사 · 동궁과 월지", x:328, y:308},
    {name:"안동", desc:"하회마을", x:296, y:238},
    {name:"포항", desc:"호미곶 · 구룡포", x:344, y:286},
  ]},
  {region:"경상남도", items:[
    {name:"통영", desc:"동피랑마을 · 한산도", x:262, y:404},
    {name:"거제", desc:"외도 · 바람의언덕", x:288, y:402},
    {name:"남해", desc:"독일마을 · 다랭이마을", x:221, y:414},
  ]},
];
const TOTAL = DATA.reduce((s,r)=>s+r.items.length, 0);

let history = [];
let excluded = [];
let currentPool = null;
let chosenRegionIdx = null, chosenDestIdx = null;
let wheel1Group = null, wheel2Group = null;

const EXCLUDED_KEY = 'kr-travel-roulette-excluded';
const hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage !== null);

// ---------- storage (Claude 아티팩트 안에서는 window.storage, 다운로드해서 단독으로 열면 localStorage로 동작) ----------
async function storageGet(key){
  if(hasClaudeStorage){
    try{ const res = await window.storage.get(key, false); return res ? res.value : null; }
    catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, value, false); }catch(e){ console.error('저장 실패', e); }
    return;
  }
  try{ localStorage.setItem(key, value); }catch(e){ console.error('저장 실패', e); }
}
async function storageDelete(key){
  if(hasClaudeStorage){
    try{ await window.storage.delete(key, false); }catch(e){}
    return;
  }
  try{ localStorage.removeItem(key); }catch(e){}
}

async function loadAll(){
  const h = await storageGet(STORAGE_KEY);
  history = h ? JSON.parse(h) : [];
  const ex = await storageGet(EXCLUDED_KEY);
  excluded = ex ? JSON.parse(ex) : [];
  renderAll();
}
async function saveHistory(){ await storageSet(STORAGE_KEY, JSON.stringify(history)); }
async function saveExcluded(){ await storageSet(EXCLUDED_KEY, JSON.stringify(excluded)); }

// ---------- pool / render ----------
function getPool(){
  return DATA.map(region => ({
    region: region.region,
    items: region.items.filter(it =>
      !history.some(h => h.region===region.region && h.name===it.name) &&
      !excluded.some(e => e.region===region.region && e.name===it.name)
    )
  })).filter(r => r.items.length > 0);
}

function renderAll(){
  const effectiveTotal = TOTAL - excluded.length;
  const pct = effectiveTotal > 0 ? (history.length/effectiveTotal*100) : 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${history.length} / ${effectiveTotal} 다녀옴` + (excluded.length ? ` · 제외 ${excluded.length}곳` : '');
  const pool = getPool();
  document.getElementById('startBtn').hidden = pool.length === 0;
  document.getElementById('allDoneMsg').hidden = pool.length !== 0;
  renderHistoryGrid();
  renderManageList();
}

function renderManageList(){
  const wrap = document.getElementById('manageList');
  wrap.innerHTML = '';
  DATA.forEach(region=>{
    const div = document.createElement('div');
    div.className = 'manage-region';
    const h4 = document.createElement('h4');
    h4.textContent = region.region;
    div.appendChild(h4);
    region.items.forEach(it=>{
      const visited = history.find(h => h.region===region.region && h.name===it.name);
      const isExcluded = excluded.some(e => e.region===region.region && e.name===it.name);
      const row = document.createElement('div');
      row.className = 'manage-row';
      let rightHTML;
      if(visited){
        rightHTML = `<span class="tag tag-visited">✓ #${visited.month} 다녀옴</span>`;
      } else if(isExcluded){
        rightHTML = `<span class="tag tag-excluded">제외됨</span><button class="btn btn-ghost btn-small" data-action="include" data-region="${region.region}" data-name="${it.name}">포함하기</button>`;
      } else {
        rightHTML = `<button class="btn btn-ghost btn-small" data-action="exclude" data-region="${region.region}" data-name="${it.name}">제외하기</button>`;
      }
      row.innerHTML = `<div><div class="manage-name">${it.name}</div><div class="manage-desc">${it.desc}</div></div><div class="row-right">${rightHTML}</div>`;
      div.appendChild(row);
    });
    wrap.appendChild(div);
  });
  wrap.querySelectorAll('button[data-action]').forEach(btn=>{
    btn.onclick = async ()=>{
      const region = btn.dataset.region, name = btn.dataset.name;
      if(btn.dataset.action === 'exclude'){
        excluded.push({region, name});
      } else {
        excluded = excluded.filter(e => !(e.region===region && e.name===name));
      }
      await saveExcluded();
      document.getElementById('stage1Card').hidden = true;
      document.getElementById('stage2Card').hidden = true;
      renderAll();
    };
  });
}

function renderHistoryGrid(){
  const grid = document.getElementById('historyGrid');
  grid.innerHTML = '';
  if(history.length === 0){
    grid.innerHTML = `<p class="empty-note">아직 도장이 없어요. 첫 여행지를 뽑아보세요!</p>`;
    return;
  }
  history.slice().sort((a,b)=>a.month-b.month).forEach(h=>{
    const div = document.createElement('div');
    div.className = 'stamp-chip';
    div.innerHTML = `<span class="chip-month">#${h.month}</span><span class="chip-region">${h.region}</span><span class="chip-name">${h.name}</span>`;
    grid.appendChild(div);
  });
}

// ---------- wheel geometry ----------
function polar(cx,cy,r,angle){
  const a = (angle-90) * Math.PI/180;
  return {x: cx + r*Math.cos(a), y: cy + r*Math.sin(a)};
}
function arcPath(cx,cy,r,start,end){
  const p1 = polar(cx,cy,r,end);
  const p2 = polar(cx,cy,r,start);
  const large = (end-start) <= 180 ? 0 : 1;
  return `M${cx},${cy} L${p1.x},${p1.y} A${r},${r} 0 ${large} 0 ${p2.x},${p2.y} Z`;
}
function buildWheelSVG(svgEl, labels){
  const n = labels.length;
  const cx=150, cy=150, r=140;
  const anglePer = 360/n;
  svgEl.innerHTML = '';
  const g = document.createElementNS(svgNS,'g');
  g.setAttribute('class','wheel-spin');
  g.style.transition = 'none';
  g.style.transform = 'rotate(0deg)';
  for(let i=0;i<n;i++){
    const start=i*anglePer, end=(i+1)*anglePer, mid=start+anglePer/2;
    const path = document.createElementNS(svgNS,'path');
    path.setAttribute('d', arcPath(cx,cy,r,start,end));
    path.setAttribute('fill', PALETTE[i % PALETTE.length]);
    path.setAttribute('stroke', '#F3ECDA');
    path.setAttribute('stroke-width','2');
    g.appendChild(path);
    const tp = polar(cx,cy,r*0.6,mid);
    const text = document.createElementNS(svgNS,'text');
    text.setAttribute('x', tp.x);
    text.setAttribute('y', tp.y);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','middle');
    text.setAttribute('transform', `rotate(${mid}, ${tp.x}, ${tp.y})`);
    text.setAttribute('class','wheel-label');
    text.textContent = labels[i];
    g.appendChild(text);
  }
  svgEl.appendChild(g);
  return g;
}
function spinWheel(group, n, targetIndex, onDone){
  const anglePer = 360/n;
  const mid = targetIndex*anglePer + anglePer/2;
  const spins = 5;
  const target = spins*360 + (360 - mid);
  group.style.transition = 'none';
  group.style.transform = 'rotate(0deg)';
  void group.getBoundingClientRect();
  requestAnimationFrame(()=>{
    group.style.transition = 'transform 3.2s cubic-bezier(.13,.66,.18,1)';
    group.style.transform = `rotate(${target}deg)`;
  });
  setTimeout(onDone, 3300);
}

// ---------- map ----------
function buildKoreaMap(svgEl, highlightRegion, highlightName){
  svgEl.innerHTML = '';
  const land = document.createElementNS(svgNS,'path');
  land.setAttribute('d', KOREA_PATH);
  land.setAttribute('class','land-shape');
  svgEl.appendChild(land);
  DATA.forEach(region=>{
    region.items.forEach(it=>{
      const isHL = region.region===highlightRegion && it.name===highlightName;
      const c = document.createElementNS(svgNS,'circle');
      c.setAttribute('cx', it.x);
      c.setAttribute('cy', it.y);
      c.setAttribute('r', isHL ? 9 : 4);
      c.setAttribute('class', isHL ? 'pin-highlight' : 'pin-dim');
      svgEl.appendChild(c);
      if(isHL){
        const label = document.createElementNS(svgNS,'text');
        label.setAttribute('x', it.x);
        label.setAttribute('y', it.y - 16);
        label.setAttribute('text-anchor','middle');
        label.setAttribute('class','pin-label');
        label.textContent = it.name;
        svgEl.appendChild(label);
      }
    });
  });
}

// ---------- flow ----------
function showStage1(){
  document.getElementById('stage1Card').hidden = false;
  document.getElementById('stage2Card').hidden = true;
  document.getElementById('result1').hidden = true;
  document.getElementById('toStage2Btn').hidden = true;
  currentPool = getPool();
  wheel1Group = buildWheelSVG(document.getElementById('wheel1'), currentPool.map(r=>r.region));
  document.getElementById('stage1Card').scrollIntoView({behavior:'smooth', block:'center'});
}

document.getElementById('startBtn').onclick = showStage1;

document.getElementById('spin1Btn').onclick = ()=>{
  const n = currentPool.length;
  const targetIdx = Math.floor(Math.random()*n);
  const btn = document.getElementById('spin1Btn');
  btn.disabled = true;
  spinWheel(wheel1Group, n, targetIdx, ()=>{
    chosenRegionIdx = targetIdx;
    const r1 = document.getElementById('result1');
    r1.hidden = false;
    r1.textContent = `이번 달은 [ ${currentPool[targetIdx].region} ] 입니다!`;
    document.getElementById('toStage2Btn').hidden = false;
    btn.disabled = false;
  });
};

document.getElementById('toStage2Btn').onclick = ()=>{
  document.getElementById('stage2Card').hidden = false;
  document.getElementById('stage2Region').textContent = currentPool[chosenRegionIdx].region;
  document.getElementById('result2').hidden = true;
  document.getElementById('openMapBtn').hidden = true;
  const items = currentPool[chosenRegionIdx].items;
  wheel2Group = buildWheelSVG(document.getElementById('wheel2'), items.map(it=>it.name));
  document.getElementById('stage2Card').scrollIntoView({behavior:'smooth', block:'center'});
};

document.getElementById('spin2Btn').onclick = ()=>{
  const items = currentPool[chosenRegionIdx].items;
  const n = items.length;
  const targetIdx = Math.floor(Math.random()*n);
  const btn = document.getElementById('spin2Btn');
  btn.disabled = true;
  spinWheel(wheel2Group, n, targetIdx, ()=>{
    chosenDestIdx = targetIdx;
    const r2 = document.getElementById('result2');
    r2.hidden = false;
    r2.textContent = `이번 달 여행지는 [ ${items[targetIdx].name} ] 입니다!`;
    document.getElementById('openMapBtn').hidden = false;
    btn.disabled = false;
  });
};

document.getElementById('openMapBtn').onclick = ()=>{
  const region = currentPool[chosenRegionIdx];
  const item = region.items[chosenDestIdx];
  document.getElementById('modalMonthLabel').textContent = `MONTH ${history.length+1} · ${region.region}`;
  buildKoreaMap(document.getElementById('koreaMap'), region.region, item.name);
  document.getElementById('modalDestTitle').textContent = item.name;
  document.getElementById('modalDestDesc').textContent = item.desc;
  document.getElementById('mapModal').hidden = false;
  const stamp = document.getElementById('stampMark');
  stamp.classList.remove('stamp-anim');
  void stamp.offsetWidth;
  requestAnimationFrame(()=> stamp.classList.add('stamp-anim'));
};

function closeModal(){ document.getElementById('mapModal').hidden = true; }
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('rerollBtn').onclick = ()=>{ closeModal(); showStage1(); };

document.getElementById('confirmBtn').onclick = async ()=>{
  const region = currentPool[chosenRegionIdx];
  const item = region.items[chosenDestIdx];
  history.push({month: history.length+1, region: region.region, name: item.name, ts: Date.now()});
  await saveHistory();
  closeModal();
  document.getElementById('stage1Card').hidden = true;
  document.getElementById('stage2Card').hidden = true;
  renderAll();
  document.getElementById('introCard').scrollIntoView({behavior:'smooth'});
};

document.getElementById('resetBtn').onclick = async ()=>{
  if(confirm('정말 방문 기록을 모두 초기화할까요? 되돌릴 수 없어요.')){
    history = [];
    await storageDelete(STORAGE_KEY);
    document.getElementById('stage1Card').hidden = true;
    document.getElementById('stage2Card').hidden = true;
    renderAll();
  }
};

document.getElementById('resetExcludedBtn').onclick = async ()=>{
  if(confirm('제외해둔 후보지 목록을 모두 초기화할까요?')){
    excluded = [];
    await storageDelete(EXCLUDED_KEY);
    document.getElementById('stage1Card').hidden = true;
    document.getElementById('stage2Card').hidden = true;
    renderAll();
  }
};

loadAll();
</script>
